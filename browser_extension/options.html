<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Secretary — Settings</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --surface: #272740;
      --border: #3a3a5c;
      --text: #e0e0ef;
      --text-muted: #8888aa;
      --accent: #6c8cff;
      --radius: 6px;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }
    h2 { font-size: 15px; margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 12px; }
    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 7px 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      margin-bottom: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .row label { margin: 0; flex: 1; }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 8px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover { opacity: 0.9; }
    .saved { color: #2ecc71; font-size: 12px; margin-left: 10px; display: none; }
  </style>
</head>
<body>
  <h2>⚙ AI Secretary Settings</h2>

  <label for="serverUrl">Server URL</label>
  <input type="text" id="serverUrl" placeholder="http://localhost:5000">

  <label for="refreshInterval">Auto-refresh interval (seconds)</label>
  <input type="number" id="refreshInterval" min="5" max="600" placeholder="30">

  <div style="display:flex;align-items:center">
    <button id="save">Save</button>
    <span class="saved" id="saved">✓ Saved</span>
  </div>

  <script>
    const DEFAULTS = { serverUrl: 'http://localhost:5000', refreshInterval: 30 };

    // Load saved settings
    chrome.storage.sync.get(DEFAULTS, (items) => {
      document.getElementById('serverUrl').value = items.serverUrl;
      document.getElementById('refreshInterval').value = items.refreshInterval;
    });

    // Save
    document.getElementById('save').addEventListener('click', () => {
      const serverUrl = document.getElementById('serverUrl').value.trim() || DEFAULTS.serverUrl;
      const refreshInterval = Math.max(5, parseInt(document.getElementById('refreshInterval').value) || DEFAULTS.refreshInterval);
      chrome.storage.sync.set({ serverUrl, refreshInterval }, () => {
        const $saved = document.getElementById('saved');
        $saved.style.display = 'inline';
        setTimeout(() => { $saved.style.display = 'none'; }, 1500);
      });
    });
  </script>
</body>
</html>
